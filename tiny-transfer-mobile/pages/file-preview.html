<body>
  <!-- Backdrop -->
  <div class="preview-backdrop" data-dom-id="preview-close" role="button" aria-label="关闭预览"></div>

  <!-- Preview Card -->
  <section class="preview-container" role="dialog" aria-label="文件预览">

    <!-- Close Button -->
    <button class="preview-close-btn" data-dom-id="preview-close" aria-label="关闭">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="4" y1="4" x2="12" y2="12"/>
        <line x1="12" y1="4" x2="4" y2="12"/>
      </svg>
    </button>

    <!-- Header -->
    <header class="preview-header">
      <span class="preview-filename" title="screenshot_2024.png">screenshot_2024.png</span>
      <span class="preview-filesize">2.4 MB</span>
    </header>

    <!-- Content -->
    <main class="preview-content">
      <div class="preview-image-wrapper">
        <!-- Placeholder landscape gradient simulating a photo -->
        <svg class="preview-image-placeholder-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="10" width="36" height="28" rx="3"/>
          <circle cx="18" cy="20" r="3"/>
          <polyline points="6,34 16,24 24,32 30,26 42,38"/>
        </svg>
      </div>
    </main>

    <!-- Actions -->
    <footer class="preview-actions">
      <button class="preview-action-btn preview-action-btn--share" aria-label="分享文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        <span>分享</span>
      </button>

      <button class="preview-action-btn preview-action-btn--download" aria-label="下载文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>下载</span>
      </button>

      <button class="preview-action-btn preview-action-btn--delete" aria-label="删除文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
        <span>删除</span>
      </button>
    </footer>
  </section>

  <!-- File Info Bar -->
  <div class="preview-info-bar" aria-live="polite">
    PNG 图片 &middot; 1920 &times; 1080 &middot; 2.4 MB
  </div>

    <style>
    /* ===== Custom Properties ===== */
    :root {
      --color-primary: var(--color-brand-brand-500);
      --color-primary-active: var(--color-brand-brand-700);
      --color-danger: var(--color-state-error-state-error);
      --color-danger-active: var(--color-state-error-state-error-dark);
      --color-surface: var(--color-background-background-50);
      --color-surface-secondary: var(--color-background-background-200);
      --color-text-primary: var(--color-text-text-800);
      --color-text-secondary: var(--color-text-text-500);
      --color-text-tertiary: var(--color-text-text-400);
      --color-border: rgba(60, 60, 67, 0.12);
      --color-border-light: rgba(60, 60, 67, 0.06);
      --color-backdrop: rgba(0, 0, 0, 0.85);
      --color-modal-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      --color-close-bg: rgba(255, 255, 255, 0.15);
      --color-close-bg-active: rgba(255, 255, 255, 0.28);
      --color-info-text: rgba(255, 255, 255, 0.7);

      --font-system: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --radius-full: 9999px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ===== Dark Mode ===== */
    html.dark {
      --color-surface: var(--color-dark-card);
      --color-surface-secondary: var(--color-dark-popover);
      --color-text-primary: var(--color-dark-foreground);
      --color-text-secondary: var(--color-dark-muted-foreground);
      --color-text-tertiary: var(--color-text-text-400);
      --color-border: rgba(84, 84, 88, 0.36);
      --color-border-light: rgba(84, 84, 88, 0.18);
      --color-modal-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      --color-close-bg: rgba(255, 255, 255, 0.12);
      --color-close-bg-active: rgba(255, 255, 255, 0.22);
    }

    /* ===== Reset ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-system);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--color-backdrop);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: var(--safe-area-top) 0 var(--safe-area-bottom);
    }

    /* ===== Backdrop (clickable to close) ===== */
    .preview-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: pointer;
    }

    /* ===== Preview Container ===== */
    .preview-container {
      position: relative;
      z-index: 1;
      width: 92vw;
      max-width: 400px;
      max-height: 80vh;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--color-modal-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: previewEnter 0.3s var(--spring) both;
    }

    @keyframes previewEnter {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ===== Close Button ===== */
    .preview-close-btn {
      position: absolute;
      top: -44px;
      right: 0;
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--color-close-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s var(--ease-out), background 0.15s var(--ease-out);
    }

    .preview-close-btn:active {
      transform: scale(0.92);
      background: var(--color-close-bg-active);
    }

    .preview-close-btn svg {
      width: 16px;
      height: 16px;
      color: var(--color-background-background-50);
    }

    /* ===== Header ===== */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border-light);
      flex-shrink: 0;
    }

    .preview-filename {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60vw;
      line-height: 1.3;
    }

    .preview-filesize {
      font-size: 13px;
      color: var(--color-text-tertiary);
      flex-shrink: 0;
      margin-left: 12px;
      line-height: 1.3;
    }

    /* ===== Content ===== */
    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      overflow: hidden;
      min-height: 0;
    }

    .preview-image-wrapper {
      width: 100%;
      max-height: 60vh;
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(
          180deg,
          var(--color-brand-brand-300) 0%,
          var(--color-background-background-100) 50%,
          var(--color-text-text-400) 100%
        );
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-image-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 30% at 50% 20%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(ellipse 40% 20% at 30% 75%, rgba(255, 255, 255, 0.08), transparent);
    }

    .preview-image-placeholder-icon {
      position: relative;
      z-index: 1;
      width: 48px;
      height: 48px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* ===== Actions ===== */
    .preview-actions {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 16px 20px;
      border-top: 1px solid var(--color-border-light);
      flex-shrink: 0;
    }

    .preview-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 44px;
      min-width: 64px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font-system);
      font-size: 11px;
      font-weight: 500;
      transition: transform 0.15s var(--ease-out), opacity 0.15s var(--ease-out);
    }

    .preview-action-btn:active {
      transform: scale(0.92);
      opacity: 0.7;
    }

    .preview-action-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Share button (secondary) */
    .preview-action-btn--share {
      color: var(--color-text-secondary);
    }

    /* Download button (primary) */
    .preview-action-btn--download {
      color: var(--color-primary);
    }

    /* Delete button (danger) */
    .preview-action-btn--delete {
      color: var(--color-danger);
    }

    /* ===== File Info Bar ===== */
    .preview-info-bar {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px 20px 0;
      color: var(--color-info-text);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      .preview-container {
        animation: none;
      }

      .preview-close-btn,
      .preview-action-btn {
        transition: none;
      }
    }
  </style>
</body>
</html>
