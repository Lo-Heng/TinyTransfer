    <nav class="steps" aria-label="连接步骤">
      <div class="step step--active">
        <div class="step__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </div>
        <span class="step__label">扫码连接</span>
      </div>
      <div class="steps__connector" aria-hidden="true"></div>
      <div class="step step--pending">
        <div class="step__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

            <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="step__label">拖拽传输</span>
      </div>
    </nav>

  <script>
    (function () {
      'use strict';

      // === Theme Toggle ===
      const html = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');

      function setTheme(dark) {
        if (dark) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
        }
        try {
          localStorage.setItem('theme', dark ? 'dark' : 'light');
        } catch (e) { /* ignore */ }
      }

      // Init theme
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          setTheme(true);
        } else if (saved === 'light') {
          setTheme(false);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          setTheme(true);
        }
      } catch (e) { /* ignore */ }

      themeToggle.addEventListener('click', function () {
        setTheme(!html.classList.contains('dark'));
      });

      // === QR Code Modal ===
      var qrCode = document.getElementById('qrCode');
      var qrModal = document.getElementById('qrModal');
      var qrModalQr = document.getElementById('qrModalQr');
      var qrModalClose = document.getElementById('qrModalClose');
      var qrSvg = document.getElementById('qrSvg');

      function openModal() {
        qrModalQr.innerHTML = '';
        var clone = qrSvg.cloneNode(true);
        clone.removeAttribute('id');
        qrModalQr.appendChild(clone);
        qrModal.classList.add('qr-modal--visible');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        qrModal.classList.remove('qr-modal--visible');
        document.body.style.overflow = '';
      }

      qrCode.addEventListener('click', openModal);
      qrCode.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal();
        }
      });

      qrModalClose.addEventListener('click', closeModal);
      qrModal.addEventListener('click', function (e) {
        if (e.target === qrModal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && qrModal.classList.contains('qr-modal--visible')) {
          closeModal();
        }
      });

      // === Copy URL ===
      var copyBtn = document.getElementById('copyBtn');
      var urlText = document.getElementById('urlText');
      var toast = document.getElementById('toast');
      var toastTimer = null;

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('toast--visible');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove('toast--visible');
        }, 2000);
      }

      copyBtn.addEventListener('click', function () {
        var url = urlText.textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function () {
            showToast('已复制到剪贴板');
          }).catch(function () {
            fallbackCopy(url);
          });
        } else {
          fallbackCopy(url);
        }
      });

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showToast('已复制到剪贴板');
        } catch (e) {
          showToast('复制失败，请手动复制');
        }
        document.body.removeChild(ta);
      }

      // === Connected Badge Demo (auto-show after 3s for demo) ===
      // In production, this would be triggered by SSE events
      // var qrBadge = document.getElementById('qrBadge');
      // setTimeout(function () {
      //   qrBadge.classList.add('qr-badge--visible');
      // }, 3000);

    })();
  </script>

      border: none;
      cursor: pointer;
      color: var(--color-primary);
      border-radius: var(--radius-full);
      flex-shrink: 0;
      transition: background-color 0.2s ease;
    }

    .url-row__copy:active {
      transform: scale(0.97);
      background-color: var(--color-bg-hover);
    }

    .url-row__copy svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ============================================
       QR Modal (fullscreen overlay)
       ============================================ */
    .qr-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background-color: var(--color-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
    }

    .qr-modal--visible {
      opacity: 1;
      pointer-events: auto;
    }

    .qr-modal__content {
      background-color: var(--color-surface);
      border-radius: var(--radius-2xl);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.9);
      transition: transform 0.35s var(--spring);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
    }

    .qr-modal--visible .qr-modal__content {
      transform: scale(1);
    }

    .qr-modal__qr {
      width: 240px;
      height: 240px;
      background-color: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-md);
    }

    .qr-modal__qr svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-modal__close {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-hover);
      border: none;
      cursor: pointer;
      color: var(--color-text-secondary);
      border-radius: var(--radius-full);
      transition: background-color 0.2s ease;
    }

    .qr-modal__close:active {
      transform: scale(0.97);
      background-color: var(--color-border-subtle);
    }

    .qr-modal__close svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ============================================
       Toast
       ============================================ */
    .toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background-color: var(--color-text-primary);
      color: var(--color-bg);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s var(--ease-out);
      z-index: 300;
      white-space: nowrap;
    }

    .toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</body>
</html>
