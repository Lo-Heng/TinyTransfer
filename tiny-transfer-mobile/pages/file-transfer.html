    /* ========== Custom Properties ========== */
    :root {

      --color-warning: var(--color-state-warning-state-warning);
      --color-border: rgba(0,0,0,0.06);
      --color-border-strong: rgba(0,0,0,0.12);
      --color-file-image: var(--color-brand-brand-500);
      --color-file-video: var(--color-chart-chart-4);
      --color-file-document: var(--color-state-warning-state-warning);
      --color-file-archive: var(--color-text-text-400);
      --color-file-audio: var(--color-state-error-state-error);
      --color-tag-local-bg: rgba(0,122,255,0.12);
      --color-tag-local-text: var(--color-brand-brand-500);
      --color-tag-device-bg: rgba(52,199,89,0.12);
      --color-tag-device-text: var(--color-state-success-state-success);
      --color-hover: rgba(0,0,0,0.04);
      --color-fab-shadow: rgba(0,122,255,0.35);

      --font-system: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --radius-2xl: 22px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);

      --ease-out: cubic-bezier(0.16,1,0.3,1);
      --spring: cubic-bezier(0.34,1.56,0.64,1);
      --dur-fast: 200ms;

    html.dark {
      --color-bg: var(--color-dark-background);
      --color-surface: var(--color-dark-card);
      --color-text-primary: var(--color-dark-foreground);
      --color-text-secondary: var(--color-dark-muted-foreground);
      --color-text-tertiary: var(--color-dark-border);
      --color-border: rgba(255,255,255,0.08);
      --color-border-strong: rgba(255,255,255,0.15);
      --color-hover: rgba(255,255,255,0.06);
      --color-tag-local-bg: rgba(0,122,255,0.2);
      --color-tag-device-bg: rgba(52,199,89,0.2);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
      --color-fab-shadow: rgba(0,122,255,0.5);

    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-system);
      background: var(--color-bg);
      color: var(--color-text-primary);

      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;

    /* ========== Top Bar ========== */

    /* ========== Main Content ========== */
    main {
      padding: 12px 16px;

    .hero-card {

      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: 16px 20px;
      margin-bottom: 20px;
      animation: fadeInUp var(--dur-normal) var(--ease-out) both;
      animation-delay: 0.05s;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-width: 0;

    .status-pill {

      align-items: center;

      color: var(--color-success);
      font-size: 12px;
      font-weight: 600;
      width: fit-content;

    .status-pill-dot {
      width: 5px;
      height: 5px;

      background: var(--color-success);
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      background: var(--color-hover);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-out);
      min-height: 32px;

    .url-row:active {
      background: var(--color-border-strong);
      transform: scale(0.97);
    }

    .url-text {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-copy-icon {
      width: 14px;
      height: 14px;
      color: var(--color-text-tertiary);
      flex-shrink: 0;
    }

    .hero-right {
      flex-shrink: 0;
      margin-left: 16px;
    }

    .qr-code {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-out),
                  box-shadow var(--dur-fast) var(--ease-out);
    }

    .qr-code:active {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(0,122,255,0.15);
      transform: scale(0.97);

      height: 60px;
      color: var(--color-text-primary);

    /* ========== Section Header ========== */
    .section-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      animation: fadeInUp var(--dur-normal) var(--ease-out) both;
      animation-delay: 0.1s;

    .section-subtitle {

      font-weight: 400;

    .section-actions {
      display: flex;

      font-family: var(--font-system);

    .chip-btn:active {

    .chip-btn.active {

    /* ========== File Grid ========== */
    .file-grid {

    .file-card {

      border-radius: var(--radius-lg);

      flex-direction: column;
      align-items: center;

      position: relative;
      transition: transform var(--dur-fast) var(--ease-out),
                  background var(--dur-fast) var(--ease-out),
                  box-shadow var(--dur-fast) var(--ease-out);
      animation: fadeInUp var(--dur-normal) var(--ease-out) both;
      min-height: 100px;
    }

    .file-card:active {
      transform: scale(0.97);
      background: var(--color-hover);

    .file-card:nth-child(4) { animation-delay: 0.24s; }
    .file-card:nth-child(5) { animation-delay: 0.27s; }
    .file-card:nth-child(6) { animation-delay: 0.30s; }

    @keyframes fadeInUp {
      from {

      width: 100%;
      height: 3px;
      border-radius: var(--radius-full);
      background: var(--color-border);
      overflow: hidden;
    }

    .disk-progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      width: 1.875%;
      transition: width var(--dur-normal) var(--ease-out);

    /* ========== FAB ========== */
    .fab {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--color-primary);
      color: var(--color-background-background-50);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--color-fab-shadow);
      z-index: 200;
      transition: transform var(--dur-fast) var(--ease-out),

      animation: fab-breathe 3s ease-in-out infinite;

      background: var(--color-primary-dark);
      animation: none;

      height: 24px;

      display: flex;
    }

    .batch-mode .fab {
      display: none;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .batch-info {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-background-background-50);
      white-space: nowrap;
    }

    .batch-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .batch-btn {
      height: 34px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-system);
      cursor: pointer;
      transition: transform var(--dur-fast) var(--ease-out),
                  opacity var(--dur-fast) var(--ease-out);
      white-space: nowrap;
    }

    .batch-btn:active {
      transform: scale(0.97);
    }

    .batch-btn.primary {
      background: rgba(255,255,255,0.25);
      color: var(--color-background-background-50);
    }

    .batch-btn.danger {
      background: rgba(255,59,48,0.2);
      color: var(--color-state-error-state-error-dark);
    }

    .batch-btn.cancel {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }

    /* ========== Reduced Motion ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</body>
</html>
