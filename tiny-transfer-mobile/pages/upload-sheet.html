<body>

<!-- Backdrop -->
<div class="sheet-backdrop" data-dom-id="sheet-backdrop" role="presentation"></div>

<!-- Bottom Sheet -->
<section class="bottom-sheet" role="dialog" aria-modal="true" aria-label="上传文件">

  <!-- Drag Handle -->
  <div class="drag-handle" aria-hidden="true">
    <div class="drag-handle-bar"></div>
  </div>

  <!-- Header -->
  <header class="sheet-header">
    <h1 class="sheet-title">上传文件</h1>
    <button class="close-btn" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </header>

  <!-- Scrollable Body -->
  <div class="sheet-body">

    <!-- Upload Options -->
    <div class="upload-options">
      <!-- Camera Option -->
      <div class="option-card" role="button" tabindex="0" aria-label="拍照上传">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <div class="option-text">
          <span class="option-title">拍照上传</span>
          <span class="option-subtitle">从相册选择或直接拍照</span>
        </div>
      </div>

      <!-- File Browser Option -->
      <div class="option-card" role="button" tabindex="0" aria-label="选择文件">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="option-text">
          <span class="option-title">浏览文件</span>
          <span class="option-subtitle">选择任意类型的文件</span>
        </div>
      </div>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" role="button" tabindex="0" aria-label="拖拽或点击选择文件">
      <div class="drop-zone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
      </div>
      <span class="drop-zone-title">拖拽文件到此处</span>
      <span class="drop-zone-hint">或点击选择文件</span>
    </div>

    <!-- Selected Files -->
    <div class="selected-files">
      <div class="selected-files-header">已选择 3 个文件</div>
      <div class="file-list">

        <!-- File 1: screenshot.png -->
        <div class="file-item">
          <div class="file-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="file-info">
            <span class="file-name">screenshot.png</span>
            <span class="file-size">1.2 MB</span>
          </div>
          <button class="file-remove" aria-label="移除 screenshot.png">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- File 2: document.pdf -->
        <div class="file-item">
          <div class="file-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <div class="file-info">
            <span class="file-name">document.pdf</span>
            <span class="file-size">856 KB</span>
          </div>
          <button class="file-remove" aria-label="移除 document.pdf">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- File 3: photo.jpg -->
        <div class="file-item">
          <div class="file-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="file-info">
            <span class="file-name">photo.jpg</span>
            <span class="file-size">3.4 MB</span>
          </div>
          <button class="file-remove" aria-label="移除 photo.jpg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- Upload Button -->
  <div class="upload-action">
    <button class="upload-btn">上传 3 个文件</button>
  </div>

</section>

  --color-error: var(--color-state-error-state-error);
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-border-medium: rgba(0, 0, 0, 0.10);
  --color-backdrop: rgba(0, 0, 0, 0.35);
  --color-hover: rgba(0, 0, 0, 0.04);
  --color-icon-tint: rgba(0, 122, 255, 0.12);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --radius-2xl: 22px;
  --radius-full: 9999px;
  --font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html.dark {
  --color-bg: var(--color-dark-background);
  --color-surface: var(--color-dark-card);
  --color-text-primary: var(--color-dark-foreground);
  --color-text-secondary: var(--color-dark-muted-foreground);
  --color-text-tertiary: var(--color-dark-border);
  --color-border-subtle: rgba(255, 255, 255, 0.08);
  --color-border-medium: rgba(255, 255, 255, 0.16);
  --color-backdrop: rgba(0, 0, 0, 0.55);
  --color-hover: rgba(255, 255, 255, 0.06);
  --color-icon-tint: rgba(0, 122, 255, 0.20);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.12);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.35);
}

/* ===== Reset & Base ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Backdrop ===== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--color-backdrop);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  animation: backdrop-in 0.35s var(--ease-out) forwards;
}

@keyframes backdrop-in {
  to { opacity: 1; }
}

/* ===== Bottom Sheet ===== */
.bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 101;
  width: 100%;
  max-height: 85vh;
  background: var(--color-surface);
  border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
  box-shadow: var(--shadow-modal);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: var(--safe-bottom);
  transform: translateY(100%);
  animation: sheet-slide-up 0.45s var(--spring) 0.05s forwards;
}

@keyframes sheet-slide-up {
  to { transform: translateY(0); }
}

/* ===== Drag Handle ===== */
.drag-handle {
  display: flex;
  justify-content: center;
  padding-top: 12px;
  padding-bottom: 4px;
  flex-shrink: 0;
}

.drag-handle-bar {
  width: 36px;
  height: 5px;
  border-radius: var(--radius-full);
  background: var(--color-border-medium);
}

/* ===== Sheet Header ===== */
.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  flex-shrink: 0;
}

.sheet-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--color-text-primary);
}

.close-btn {
  width: 32px;
  height: 32px;
  min-width: 32px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: var(--color-hover);
  border-radius: var(--radius-full);
  cursor: pointer;
  color: var(--color-text-secondary);
  transition: transform 0.2s var(--ease-out), background 0.15s ease;
}

.close-btn:active {
  transform: scale(0.88);
  background: var(--color-border-medium);
}

.close-btn svg {
  width: 16px;
  height: 16px;
  stroke-width: 2.5;
}

/* ===== Sheet Body (scrollable) ===== */
.sheet-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 20px 8px;
  overscroll-behavior: contain;
}

/* ===== Upload Option Cards ===== */
.upload-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.option-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--color-surface);
  border: 1.5px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: transform 0.2s var(--ease-out), border-color 0.2s ease, background 0.2s ease;
  min-height: 76px;
}

.option-card:active {
  transform: scale(0.98);
  border-color: var(--color-primary);
}

.option-icon {
  width: 44px;
  height: 44px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  background: var(--color-icon-tint);
  color: var(--color-primary);
}

.option-icon svg {
  width: 22px;
  height: 22px;
}

.option-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}

.option-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text-primary);
  letter-spacing: -0.01em;
}

.option-subtitle {
  font-size: 13px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Drop Zone ===== */
.drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 32px 24px;
  border: 1.5px dashed var(--color-border-medium);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: transform 0.25s var(--ease-out), border-color 0.2s ease, background 0.2s ease;
  margin-bottom: 16px;
  min-height: 120px;
}

.drop-zone:active {
  transform: scale(1.01);
  border-color: var(--color-primary);
  background: var(--color-primary-subtle);
}

.drop-zone.dragover {
  border-style: solid;
  border-color: var(--color-primary);
  background: var(--color-primary-subtle);
  transform: scale(1.015);
}

.drop-zone-icon {
  color: var(--color-primary);
}

.drop-zone-icon svg {
  width: 40px;
  height: 40px;
}

.drop-zone-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.drop-zone-hint {
  font-size: 13px;
  color: var(--color-text-secondary);
}

/* ===== Selected Files ===== */
.selected-files {
  margin-bottom: 16px;
}

.selected-files-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: 8px;
  padding-left: 2px;
}

.file-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.15s ease;
  min-height: 44px;
}

.file-item:active {
  background: var(--color-hover);
}

.file-icon {
  width: 36px;
  height: 36px;
  min-width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: var(--color-icon-tint);
  color: var(--color-primary);
}

.file-icon svg {
  width: 18px;
  height: 18px;
}

.file-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.file-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-size {
  font-size: 12px;
  color: var(--color-text-tertiary);
}

.file-remove {
  width: 28px;
  height: 28px;
  min-width: 28px;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  border-radius: var(--radius-full);
  cursor: pointer;
  color: var(--color-error);
  transition: transform 0.2s var(--ease-out), background 0.15s ease;
}

.file-remove:active {
  transform: scale(0.85);
  background: rgba(255, 59, 48, 0.12);
}

.file-remove svg {
  width: 16px;
  height: 16px;
  stroke-width: 2.5;
}

/* ===== Upload Button ===== */
.upload-action {
  padding: 0 20px 16px;
  padding-bottom: calc(16px + var(--safe-bottom));
  flex-shrink: 0;
}

.upload-btn {
  width: 100%;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  color: var(--color-background-background-50);
  font-family: var(--font-family);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  cursor: pointer;
  padding: 14px 24px;
  transition: transform 0.2s var(--ease-out), background 0.15s ease;
  box-shadow: 0 1px 3px rgba(0, 122, 255, 0.25);
}

.upload-btn:active {
  transform: scale(0.97);
  background: var(--color-primary-active);
}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  .sheet-backdrop {
    animation: none;
    opacity: 1;
  }
  .bottom-sheet {
    animation: none;
    transform: translateY(0);
  }
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
</style>
</body>
</html>
