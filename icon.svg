<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680">
  <defs>
    <radialGradient id="aurora" cx="0.5" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#5BAAFF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#3388DD" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0055E8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="boltAura" cx="0.5" cy="0.5" r="0.40">
      <stop offset="0%" stop-color="#AAD4FF" stop-opacity="0.48"/>
      <stop offset="30%" stop-color="#80BFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0055E8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="core" cx="0.5" cy="0.55" r="0.22">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.52"/>
      <stop offset="40%" stop-color="#CCE5FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0055E8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.75
                0 0 0 0 1
                0 0 0 0.35 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="28" y="28" width="624" height="624" rx="156" fill="#0055E8"/>

  <rect x="28" y="28" width="624" height="624" rx="156" fill="url(#aurora)"/>

  <circle cx="340" cy="342" r="210" fill="url(#boltAura)"/>

  <circle cx="340" cy="348" r="120" fill="url(#core)"/>

  <g filter="url(#boltGlow)">
    <path d="M376 142 L178 358 L322 358 L286 538 L502 322 L358 322 Z" fill="#FFFFFF" stroke="none"/>
  </g>

  <rect x="28" y="28" width="624" height="624" rx="156" fill="url(#glass)"/>

  <rect x="28" y="28" width="624" height="624" rx="156" fill="none" stroke="url(#edge)" stroke-width="2"/>
